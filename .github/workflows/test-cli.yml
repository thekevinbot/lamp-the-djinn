name: Test CLI

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - '.devcontainer/**'
      - 'pyproject.toml'
      - '.github/workflows/test-cli.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - '.devcontainer/**'
      - 'pyproject.toml'
      - '.github/workflows/test-cli.yml'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install project + dev dependencies
        run: uv sync --extra dev --python 3.12

      - name: Run unit tests
        # Unit tier: colocated next to source (src/**/*_test.py), marked `unit`.
        run: uv run pytest src -m unit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install project + dev dependencies
        run: uv sync --extra dev --python 3.12

      - name: Run integration tests
        # Integration tier (tests/integration), marked `integration`: first-party
        # code runs for real against the host filesystem/env; collaborators
        # (Docker, subprocess, network) are mocked, so no container is needed.
        run: uv run pytest tests/integration -m integration

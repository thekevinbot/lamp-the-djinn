name: Testing Conventions

# Deterministic enforcement of the testing discipline documented in AGENTS.md:
# colocated unit tests, isolated unit tests, integration tests that never mock
# first-party code, a unit-coverage floor, no test files in the built
# distribution, and a fresh e2e attestation. This workflow IS the gate; AGENTS.md
# is the why, and testing-conventions.toml holds the floors and exemptions.
#
# It runs the published `testing-conventions` binary via npx (a prebuilt npm
# package -- no Rust toolchain, no compile) and gets its Python environment from
# uv (no pip), matching the rest of the repo's CI.
#
# Why one job with explicit per-rule scan paths, not the upstream zero-config
# reusable workflow: the drop-in drives a single `path` through every rule, but
# this repo's rules need different roots. The unit rules scan `src` (the
# colocated unit tests), while `integration lint` must scan `tests/integration`
# -- pointed at `src` it would flag the colocated unit tests' legitimate
# monkeypatch/patch use, going red for the wrong reason. The drop-in's coverage
# job also installs only `coverage pytest`, missing the `pytest-describe` this
# repo's describe_/it_ tests need to be collected at all. So the wiring is
# explicit: the right root per rule, and the project's own venv on PATH for
# coverage.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'testing-conventions.toml'
      - 'e2e-attestation.json'
      - '.github/workflows/conventions.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'testing-conventions.toml'
      - 'e2e-attestation.json'
      - '.github/workflows/conventions.yml'

permissions:
  contents: read

env:
  # Pin the binary by setting a version (e.g. 0.1.0); empty tracks npm latest,
  # the same default as the upstream reusable workflow.
  TC_VERSION: ''

jobs:
  conventions:
    name: Testing conventions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # `e2e verify` walks git history for the latest code commit.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install project + dev dependencies
        # The dev extra pins pytest-describe (collects the describe_/it_ suites)
        # and coverage, which `unit coverage` shells out to. Python 3.12 satisfies
        # curtaincall's marker too.
        run: uv sync --extra dev --python 3.12

      - name: Put the project venv on PATH
        # `unit coverage` runs `coverage run -m pytest` from PATH; it must resolve
        # to the synced venv (which has coverage + pytest-describe), not a bare
        # system python.
        run: echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Set up Node (runs the testing-conventions binary via npx)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Colocated unit tests (src)
        run: npx -y "testing-conventions${TC_VERSION:+@$TC_VERSION}" unit colocated-test --language python --config testing-conventions.toml src

      - name: Unit-test isolation (src)
        run: npx -y "testing-conventions${TC_VERSION:+@$TC_VERSION}" unit lint --language python --config testing-conventions.toml src

      - name: Integration-test mocking hygiene (tests/integration)
        run: npx -y "testing-conventions${TC_VERSION:+@$TC_VERSION}" integration lint --language python --config testing-conventions.toml tests/integration

      - name: Unit coverage floor (src)
        run: npx -y "testing-conventions${TC_VERSION:+@$TC_VERSION}" unit coverage --language python --config testing-conventions.toml src

      - name: Build the distribution
        run: uv build

      - name: Packaging — no test files in the built artifact
        run: |
          set -euo pipefail
          # nullglob: an unmatched glob expands to nothing, not the literal.
          shopt -s nullglob
          checked=0
          for dist in dist/*.whl dist/*.tar.gz; do
            npx -y "testing-conventions${TC_VERSION:+@$TC_VERSION}" packaging "$dist" --language python
            checked=$((checked + 1))
          done
          if [ "$checked" -eq 0 ]; then
            echo "::error::no built distribution (.whl / .tar.gz) found in dist/"
            exit 1
          fi

      - name: E2E attestation freshness (verify-if-present)
        # Default-on, skip-if-absent: the e2e suite is never run in CI (real
        # containers + model turns are slow and cost money), so this only checks
        # that a committed attestation names the current commit. Until task #20
        # produces one, there's nothing to verify.
        run: |
          if [ -f e2e-attestation.json ]; then
            npx -y "testing-conventions${TC_VERSION:+@$TC_VERSION}" e2e verify
          else
            echo "no e2e-attestation.json yet -- skipping (create one with 'testing-conventions e2e attest')"
          fi

# LiteLLM proxy -- the provider seam. Runs on the host, NOT inside the cage,
# so the OpenRouter key stays out of the agent's blast radius.
# Bound to localhost; the cage reaches it later via the docker bridge gateway.
services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      # Published on all interfaces so cages reach it via host.docker.internal.
      # TODO(security): scope to the docker bridge IP, or set a LiteLLM master_key,
      # so the proxy is not reachable from the wider LAN/tailnet.
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    restart: unless-stopped
